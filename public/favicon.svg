<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#004482"/>
      <stop offset="100%" stop-color="#081e3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="45%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#004482"/>
      <stop offset="100%" stop-color="#081e3a"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#glow)"/>
  <!-- Venn circles -->
  <g opacity="0.25" fill="none" stroke="white" stroke-width="2">
    <circle cx="256" cy="118" r="102"/>
    <circle cx="167" cy="272" r="102"/>
    <circle cx="345" cy="272" r="102"/>
  </g>
  <!-- Intersection fills -->
  <g opacity="0.08" fill="white">
    <circle cx="256" cy="195" r="30"/>
  </g>
  <!-- Node dots -->
  <g fill="#00DBFF">
    <circle cx="256" cy="195" r="4" opacity="0.85"/>
    <circle cx="212" cy="215" r="3" opacity="0.6"/>
    <circle cx="300" cy="215" r="3" opacity="0.6"/>
    <circle cx="256" cy="248" r="3" opacity="0.6"/>
  </g>
  <!-- Connecting lines -->
  <g stroke="#00DBFF" stroke-width="1" opacity="0.2">
    <line x1="212" y1="215" x2="256" y2="195"/>
    <line x1="300" y1="215" x2="256" y2="195"/>
    <line x1="256" y1="248" x2="256" y2="195"/>
  </g>
  <!-- QOA text -->
  <text x="256" y="410" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="800" font-size="160" fill="white" text-anchor="middle" letter-spacing="-4">QOA</text>
  <!-- Accent line -->
  <line x1="180" y1="430" x2="332" y2="430" stroke="url(#bg)" stroke-width="3" opacity="0"/>
  <rect x="180" y="429" width="152" height="3" rx="1.5" fill="#00DBFF" opacity="0.7"/>
  <!-- Micro tagline -->
  <text x="256" y="462" font-family="monospace" font-size="12" fill="white" text-anchor="middle" opacity="0.35" letter-spacing="1">QUALIDADE · OBSERVABILIDADE · ARQUITETURA</text>
</svg>
