name: Accessibility Testing

on:
  pull_request:
  workflow_dispatch:

jobs:
  accessibility:
    runs-on: ubuntu-latest
    name: Run Pa11y Accessibility Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Start local server
        run: |
          npm run serve &
          sleep 5
          echo "Server started"

      - name: Run Pa11y accessibility tests
        run: npm run test:a11y

      - name: Upload Pa11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-report
          path: reports/pa11y/
          retention-days: 30

      - name: Accessibility test summary
        if: always()
        run: |
          echo "✅ Accessibility tests completed"
          echo "📊 Check artifacts for detailed reports"
